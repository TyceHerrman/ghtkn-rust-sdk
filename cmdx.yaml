---
tasks:
  - name: test
    short: t
    description: Run all tests
    usage: Run all tests
    script: cargo test
  - name: vet
    short: v
    description: Run clippy linter
    usage: Run clippy with deny warnings
    script: cargo clippy -- -D warnings
  - name: fmt
    short: f
    description: Check formatting
    usage: Check code formatting
    script: cargo fmt -- --check
  - name: build
    short: b
    description: Build the project
    usage: Build the project
    script: cargo build
  - name: doc
    short: d
    description: Generate documentation
    usage: Generate documentation
    script: cargo doc --no-deps --open
  - name: deny
    description: Check advisories and licenses
    usage: Run cargo-deny checks
    script: cargo deny check
  - name: machete
    description: Detect unused dependencies
    usage: Find unused dependencies
    script: cargo machete --with-metadata
  - name: msrv
    description: Verify MSRV
    usage: Verify minimum supported Rust version
    script: cargo msrv verify
